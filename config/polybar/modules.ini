; modified https://github.com/gh0stzk/dotfiles

[module/bi]
type                        = custom/text
content                     = "%{T5}%{T-}bi"
content-foreground          = ${color.mb}
content-background          = ${color.bg}

[module/bd]
type                        = custom/text
content                     = "%{T5}%{T-}bd"
content-foreground          = ${color.mb}
content-background          = ${color.bg}

######################################################

[module/time]
type = internal/date
interval = 60
format = <label>
date = %{F#689d61}%{T2} %{T-}%{F#ebdbb2}%I:%M %p%{F-}
time-alt = %{F#689d6a}%{T2} %{F#ebdbb2}%{T-}%a, %b %d%{F-}

label = %date%%time%

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 60
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = "%{T2} %{T-}"
format-mounted-prefix-background = transparent
format-mounted-prefix-foreground = ${color.amber}

format-unmounted = <label-unmounted>
format-unmounted-prefix = "%{T2} %{T-}"

label-mounted = %used%
label-mounted-background = transparent

label-unmounted = %mountpoint%: not mounted

######################################################

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = true
interval = 2

format-volume = <ramp-volume><label-volume>
format-volume-prefix = ""
format-volume-background = transparent
format-volume-foreground = ${color.indigo}

label-volume = " %percentage% "
label-volume-background = transparent
label-volume-foreground = ${color.fg}

format-muted = <label-muted>
format-muted-prefix = "%{T2}%{T-}"
format-muted-foreground = ${color.red}
format-muted-background = transparent
label-muted = " "
label-muted-foreground = ${color.red}
label-muted-background = transparent

ramp-volume-0 = "%{T2}%{T-}"
ramp-volume-1 = "%{T2}%{T-}"
ramp-volume-2 = "%{T2} %{T-}"
ramp-volume-3 = "%{T2} %{T-}"
ramp-volume-4 = "%{T2} %{T-}"
#ramp-volume-font = 4

click-right = bspc rule -a Pavucontrol -o state=floating follow=on center=true && pavucontrol

######################################################

[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false


format = <label-state>

label-focused = "%{T2}󰐾" 
label-focused-background = transparent
label-focused-padding = 1
label-focused-foreground = ${color.yellow}

label-occupied = "%{T2}󰻂"
label-occupied-padding = 1
label-occupied-background = transparent
label-occupied-foreground= #6272a4

label-urgent = %icon%
label-urgent-padding = 0

label-empty = "%{T2}󰄰"
label-empty-foreground = ${color.blue}
label-empty-padding = 1
label-empty-background = transparent

######################################################

[module/powermenu]
type = custom/text
content = "%{T3}"
content-foreground = ${color.fg}
click-left = ~/.config/rofi/powermenu/powermenu
click-right = ~/.config/rofi/powermenu/powermenu


######################################################

[module/sep1]
type = custom/text
content = " "
content-foreground = ${color.bg}

[module/sep2]
type = custom/text
content = "  "
content-foreground = ${color.bg}

[module/pipe]
type = custom/text
content = "|"
content-foreground = ${color.fg}

######################################################

[module/arch]
type = custom/text
content = "%{T3}"
content-foreground = ${color.blue-gray}
click-left = rofi -show drun
click-right = rofi -show drun

######################################################

[module/cpu_bar]
type = internal/cpu
interval = 0.5
format = <label>
format-prefix = "%{T4}󰻠 %{T-}"
format-prefix-background = transparent
format-prefix-foreground = ${color.red}
label = "%percentage%%"
label-background = transparent

######################################################

[module/memory_bar]
type = internal/memory
interval = 3
format = <label>
format-prefix = "%{T2} %{T-}"
format-prefix-background = transparent
format-prefix-foreground = ${color.cyan}
label = %used%
label-background = transparent

######################################################

[module/wifi]
type = internal/network
# get ur interface -- by "ip link" the result with prefix 'wl' is ur interface id
#interface =interface
format-connected = <label-connected>
format-connected-prefix = "󰖩 "
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰖪 "
format-disconnected-padding = 1
label-connected = "%{A1:networkmanager_dmenu &:}%essid%%{A}"
label-disconnected = "%{A1:networkmanager_dmenu &:}Offline%{A}"
format-connected-foreground = #A3BE8C
format-disconnected-foreground = #d35f5e 

[module/ethernet]
type = internal/network
interface = enp0s3
format-connected = <label-connected>
format-connected-prefix = "󰈀 "
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰈀 "
format-disconnected-padding = 1
label-connected = "%{A1:networkmanager_dmenu &:}%downspeed%%{A}"
label-disconnected = "%{A1:networkmanager_dmenu &:}Offline%{A}"


######################################################################

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98

format-charging = <animation-charging><label-charging>
label-charging = %percentage%%
format-charging-padding = 1
format-charging-foreground = ${color.red}
format-discharging = <ramp-capacity><label-discharging>
label-discharging = %percentage%%

format-discharging-foreground = ${color.fg}

format-full-prefix = "%{T3} %{T-}"
format-full-prefix-foreground = #A0E8A2
format-foreground = ${color.green}
format-background = #2b2f37 

label-discharging-foreground = ${color.fg}

ramp-capacity-foreground =  #A0E8A2  
label-charging-foreground = ${color.fg}

ramp-capacity-0 = "%{T3} %{T-}" 
ramp-capacity-1 = "%{T3} %{T-}" 
ramp-capacity-2 = "%{T3} %{T-}"
ramp-capacity-3 = "%{T3} %{T-}" 
ramp-capacity-4 = "%{T3} %{T-}"

animation-charging-0 = "%{T3} %{T-}" 
animation-charging-1 = "%{T3} %{T-}" 
animation-charging-2 = "%{T3} %{T-}" 
animation-charging-3 = "%{T3} %{T-}" 
animation-charging-4 = "%{T3} %{T-}"

animation-charging-foreground = #DF8890
animation-charging-framerate = 910 
format-discharging-padding = 1


######################################################

[module/network]
type = custom/script
interval = 3
exec = ~/.config/polybar/network.sh
#click-left = ?


######################################################

[module/files]
type = custom/text
content = "%{T3}󰝰"
content-foreground = ${color.fg}
click-left = thunar &
click-right = thunar &

######################################################

[module/arrow]
type = custom/script
exec = echo ""
content-font = 4
click-left = bash $HOME/.config/polybar/tinybar.sh
click-right = bash $HOME/.config/polybar/killbar.sh

##########################END#########################
